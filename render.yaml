services:
  - type: web
    name: nextcandle-server
    runtime: python
    buildCommand: pip install -r requirements_server.txt
    startCommand: python nextcandle_server.py
    plan: starter          # $7/mois — pas de spin-down (free tier spin-down après 15min)
    healthCheckPath: /
    envVars:
      - key: SUPABASE_URL
        sync: false        # à remplir dans Render Dashboard → Environment
      - key: SUPABASE_SERVICE_KEY
        sync: false        # à remplir dans Render Dashboard → Environment
      - key: BINANCE_SYMBOL
        value: BTCUSDT
      - key: MIN_QUALITY
        value: "5.5"
